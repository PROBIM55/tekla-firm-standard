/* Папка фирмы (на всякий случай) */
set XS_FIRM=C:\Company\TeklaFirm\XS_FIRM

/* Папка с настройками на уровне компании - считывает файл company.ini(резерм МИП) */
set XS_FIRM=C:\Company\TeklaFirm\XS_FIRM\

/* Папка с настройками профилей */
set XS_PROFDB=C:\Company\TeklaFirm\XS_FIRM\Catalogs\

/* Папка с символами */
set DXK_SYMBOLPATH=C:\Company\TeklaFirm\XS_FIRM\Symbols\;C:\TeklaStructures\2025.0\Environments\GOST\General\symbols\;C:\TeklaStructures\2025.0\Environments\common\symbols\

/* Папка с файлами пользовательских атрибутов */
set XS_INP=XS_INP=C:\Company\TeklaFirm\XS_FIRM\INP\;C:\TeklaStructures\2025.0\environments\GOST\General\INP\;C:\TeklaStructures\2025.0\environments\common\inp\;C:\TeklaStructures\2025.0\environments\common\profil\;C:\TeklaStructures\2025.0\environments\common\collaboration\ifc;C:\TeklaStructures\2025.0\bin\Env\Common\inp\

/* Настройки редактора шаблонов */
set XS_TPLED_INI=C:\Company\TeklaFirm\XS_FIRM\Templates\Settings\

/* Папка с шаблонами чертежей и отчетами */
set XS_TEMPLATE_DIRECTORY_SYSTEM=C:\Company\TeklaFirm\XS_FIRM\Templates\;C:\TeklaStructures\2025.0\Environments\GOST\General\Templates\

/* Папка макросов (глобальная, локальная) */
set XS_MACRO_DIRECTORY=C:\Company\TeklaFirm\XS_FIRM\Macros\;C:\TeklaStructures\2025.0\Environments\common\macros\;C:\TeklaStructures\2025.0\Environments\GOST\General\Macros\

/* Папка импорта файлов картинок (bitmaps) */
set DAK_BMPPATH=C:\Company\TeklaFirm\XS_FIRM\bitmaps\;C:\TeklaStructures\2025.0\Bitmaps\;C:\TeklaStructures\2025.0\bin\Env\Bitmaps\;C:\TeklaStructures\2025.0\bin\applications\Tekla\Tools\TplEd\bitmaps\;C:\TeklaStructures\2025.0\Environments\GOST\General\Bitmaps\;C:\TeklaStructures\2025.0\Environments\GOST\ModelTemplates\Общий\attributes\bitmaps\

/* Папка импорта файлов .uel*/
set XS_UEL_IMPORT_FOLDER=C:\Company\TeklaFirm\XS_FIRM\UEL\Components\;

/* Сохранение истории модели */
set XS_COLLECT_MODEL_HISTORY=TRUE

/* Использование файлов .db1 в качестве опорных моделей */
set XS_ENABLE_NATIVE_MODEL_AS_REFERENCE_MODEL=TRUE

/* Создание .bak файлов при каждом сохранении модели */
set XS_STORE_MULTIPLE_BAK_FILES=TRUE
set XS_DELETE_OLD_BAK_FILES=5

/* Выключение режима захваток бетонирования */
rem set XS_ENABLE_POUR_MANAGEMENT=FALSE

/*Папка с расширениями и плагинами*/
set XS_EXTENSION_DIRECTORY=%XSDATADIR%\Environments\common\Extensions\

/*-----------------Параметры для чертежей-----------------*/

/*Открывать чертежи всегда развернутыми (на весь экран)*/
set XS_OPEN_DRAWINGS_MAXIMIZED=TRUE

/*Более быстрая отрисовка графики на чертежах при масштабировании*/
rem set XS_USE_SMART_PAN=TRUE

/*Форма концов линий на распечатках файлов PDF - установлено значение 1 (скругленные углы)*/
set XS_DRAWINGS_LINE_CAP_STYLE=1

/*Стандартный шрифт для модели и чертежей*/
set XS_DEFAULT_UNICODE_FONT_DRAWING_PRINTING=GOST type A Tekla
set XS_DIMENSION_FONT=GOST type A Tekla
rem set XS_DEFAULT_FONT=GOST type A Tekla
set XS_GRID_TEXT_FONT=GOST type A Tekla
set XS_MARK_FONT=GOST type A Tekla
set XS_VIEW_TITLE_FONT=GOST type A Tekla
set XS_WELD_FONT=GOST type A Tekla

/*-----------------Параметры логирования-----------------*/
set XS_LOG_LEVEL=TRUE

/* --- СИСТЕМНЫЕ НАСТРОЙКИ И ИНТЕРФЕЙС ---*/
/* Автосохранение модели каждые 30 команд*/
set XS_AUTOSAVE_AFTER_ANY_COMMANDS=30
/* Отключение заставки при запуске для экономии времени*/
set XS_SHOW_SPLASH_SCREEN=FALSE
/*! Показывать направление моделирования (желтая стрелка на деталях)*/
set XS_SHOW_DIRECTION_MARKS=TRUE

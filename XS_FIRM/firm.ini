! ========================================================================================
! КОРПОРАТИВНАЯ КОНФИГУРАЦИЯ ТЕХНИЧЕСКОГО ОТДЕЛА
! Файл: firm.ini (Централизованные настройки компании)
! ========================================================================================
! ОПИСАНИЕ:
! Данный файл содержит общие расширенные параметры для всех пользователей.
! Настройки здесь переопределяют системные значения среды, но могут быть 
! изменены локальными параметрами в user.ini или options.ini модели.
!
! ПРАВИЛА РАБОТЫ:
! 1. ЗАПРЕЩЕНО самостоятельно редактировать этот файл без уведомления BIM-менеджера.
! 2. При изменении путей или системных шрифтов требуется перезапуск Tekla.
! 3. Настройки типа MODEL применяются только К НОВЫМ моделям. 
!
! Дата последнего обновления: 03.04.2026
! Ответственный: BIM-Администратор (e-mail: n.miryanin@spb.gpsm.ru/Telegram: Miryanin_NV)
! ========================================================================================

! --- МЕСТОПОЛОЖЕНИЯ ФАЙЛОВ (РЕСУРСЫ ФИРМЫ) ---
! --- 1. ПУТИ К РЕСУРСАМ (ПРИОРИТЕТ: FIRM -> GOST -> COMMON) ---
! Настройка путей к системным файлам, макросам, символам и шаблонам

set XS_SYSTEM=%XS_FIRM%\System\;%XSDATADIR%\environments\GOST\general\system\;%XSDATADIR%\environments\common\system\
set XS_TEMPLATE_DIRECTORY=%XS_FIRM%\Templates\;%XSDATADIR%\environments\GOST\general\templates\
set XS_MACRO_DIRECTORY=%XS_FIRM%\Macros\;%XSDATADIR%\environments\GOST\general\macros\;%XSDATADIR%\environments\common\macros\
set XS_FIRM_MARK_IMAGE_PATH=%XS_FIRM%\Bitmaps\
set XS_PROFDB=%XS_FIRM%Catalogs\
set DAK_BMPPATH=%XS_FIRM%bitmaps\;%XSDATADIR%bitmaps\

! Путь к символам (объединяем папку фирмы и системную)
set DXK_SYMBOLPATH=%XS_FIRM%\Symbols\;%XSDATADIR%\environments\gost\general\symbols\;%XSDATADIR%\environments\common\symbols\

! Настройка папок INP (важно для появления атрибутов)
set XS_INP=%XS_FIRM%\Inp\;%XSDATADIR%\environments\GOST\general\inp\;%XSDATADIR%\environments\common\inp\

! --- ЛОГИКА НУМЕРАЦИИ И МОДЕЛИРОВАНИЯ ---
! Эти параметры обеспечивают единство данных во всех проектах
set XS_USE_ASSEMBLY_NUMBER_FOR=MAIN_PART
set XS_ENABLE_PHASE_OPTION_IN_NUMBERING=TRUE
set XS_ENABLE_POUR_MANAGEMENT=TRUE

! Формат номера позиции семейства (используем двойные % в .ini файлах)
set XS_ASSEMBLY_FAMILY_POSITION_NUMBER_FORMAT_STRING=%%ASSEMBLY_PREFIX%%%%ASSEMBLY_FAMILY_NUMBER%%

! --- СИСТЕМНЫЕ ШРИФТЫ И ВИЗУАЛИЗАЦИЯ ---
! Устанавливаем GOST type A как корпоративный стандарт
set XS_DEFAULT_FONT=GOST type A
set XS_MARK_FONT=GOST type A
set XS_GRID_TEXT_SIZE=2.5
set XS_WELD_SYMBOL_TYPE=ISO
set XS_USER_DEFINED_BOLT_SYMBOL_TABLE=x_bolt.sym

/*Символы сечений*/
set XS_SECTION_SYMBOL_LEFT_ARROW_SYMBOL=sections@24
set XS_SECTION_SYMBOL_RIGHT_ARROW_SYMBOL=sections@23

/*Наименование чертежа*/
set XS_ASSEMBLY_DRAWING_VIEW_TITLE=Mark %%ASSEMBLY_POS%%
set XS_SINGLE_PART_DRAWING_VIEW_TITLE=Pos. %%PART_POS%%

/*Окно чертежа всегда развернуто*/
set XS_OPEN_DRAWINGS_MAXIMIZED=TRUE

/*Влияние стадии на нумерацию*/
set XS_ENABLE_PHASE_OPTION_IN_NUMBERING=TRUE

/*Размер круглого символа сетки*/
set XS_DRAWING_GRID_LABEL_FRAME_FIXED_WIDTH=10

/*Символ болтов*/
set XS_USER_DEFINED_BOLT_SYMBOL_TABLE=bolt_symbol_table.txt

/*Включение менеджера монолитных конструкций*/
set XS_ENABLE_POUR_MANAGEMENT=TRUE

/*Диаметр арматуры*/
set XS_USE_ONLY_NOMINAL_REBAR_DIAMETER=TRUE

/*Локализация страниц в компонентах*/
set XS_STEEL1_TS_PAGE_10_EXTENSION=_europe
set XS_STEEL1_TS_PAGE_9_EXTENSION=_default

/*Прочие настройки чертежа*/
set XS_DRAWING_POINT_SCALE=0
set XS_DRAW_HORIZONTAL_VIEW_SHORTENING_SYMBOLS_TO_PARTS=TRUE
set XS_DRAW_VERTICAL_VIEW_SHORTENING_SYMBOLS_TO_PARTS=TRUE
set XS_SHORTENING_SYMBOL_COLOR=163
set XS_USE_EXISTING_SINGLE_PART_DRAWINGS_IN_ASSEMBLY_DRAWINGS=TRUE
set XS_DRAWING_PART_SYMBOL_REPRESENTATION_TYPE=1
set XS_ENABLE_MIDDLE_BUTTON_DOUBLE_CLICK_ZOOM_ORIGINAL=TRUE
set XS_ADD_SNAPPING_SYMBOL_TO_CIRCLES=TRUE
set XS_SHOW_REVISION_MARK_ON_DRAWING_LIST=TRUE
set XS_MULTIDRAWING_REMOVE_VIEW_LABEL_GAP=TRUE
set XS_DISABLE_VIEW_CENTERING_MULTI=TRUE
set XS_USE_CROSS_FOR_OPENING_SYMBOL=FALSE

! --- СИСТЕМНЫЕ НАСТРОЙКИ И ИНТЕРФЕЙС ---
! Автосохранение модели каждые 30 команд
set XS_AUTOSAVE_AFTER_ANY_COMMANDS=30
! Отключение заставки при запуске для экономии времени
set XS_SHOW_SPLASH_SCREEN=FALSE
! Показывать направление моделирования (желтая стрелка на деталях)
set XS_SHOW_DIRECTION_MARKS=TRUE